l_russian:
  #OLD
  old.1.t: "[FROM.GetLeader] поднимает бунт"
  old.1.d: "Со стороны кладбища зреет восстание."
  old.1.a: "Пусть заканчивает с шутками"
  old.1.b: "Это не стоит нашего времени"
  old.2.t: "[FROM.GetLeader] требует, чтобы мы выбрали сторону"
  old.2.d: "Конфетные ведут крестовый поход против нежити на север. Мы тоже можем попасть под удар, если не станем сотрудничать. К нашему счастью (наверное) мы не столь важная цель как королева вампиров, поэтому нам предлагают альтернативу уничтожению - сотрудничество против сил вампирши. Приняв это предложение [MAR.GetLeader] поймёт, что мы предатели, с которыми больше не стоит вести дел. Но переживут ли грядущую бойню вампиры?"
  old.2.a: "Полагаю, у нас нет выбора"
  old.2.b: "Мы не подставим [MAR.GetLeader]!"
  old.3.t: "Угроза со стороны конфетного королевства"
  old.3.d: "От наших южных соседей всё чаще слышны агрессивные возгласы, настраивающие народ против нас. Это не может не настораживать, особенно если вспомнить что [PBB.GetLeader] редко занимается такой чушью. Странно всё это. Но в любом случае - нам нужно готовится к войне"
  old.3.a: "Окей, это стрёмно"
  old.4.t: "Вместе на службе короне"
  old.4.d: "[FROM.GetLeader] - верный слуга принцессы нашей империи - успел не плохо развить инфраструктуру кладбища, превратив его в равное нам по значимости герцогство. В связи с этим к нам поступает предложение об объединении двух автономий в единое северное герцогство на службе короны. Это значительно упростит метрополии бюрократические задачи в регионе, но поставит крест на нашей дальнейшей самостоятельности. Так как всё уже решено без нас, всё что мы можем сделать это настоять на автономии уже внутри новообразованного герцогства под руководством [FROM.GetLeader]. Иначе, фактически, аннексия."
  old.4.a: "А есть смысл отказывать?"
  old.4.b: "Да пофиг, империя всё та же"
  old.5.t: "[FROM.GetLeader] ставит нашу власть под сомнение"
  old.5.d: "Уже достаточно давно [FROM.GetName] является рассадником дурных слухов о нашей великой стране и о нашем великом лидере в частности. Это непозволительная наглость, которая достигла своего апогея, когда [FROM.GetLeader] вовсеуслышание заявил, что мы не имеем над ним власти. И также не имеем власти над территорией его радиостанции. Это открытое объявление о независимости и неповиновении закону Империи. Мы должны что-то предпринять и как можно скорее!"
  old.5.a: "От них слишком много хлопот"
  old.5.b: "Не бывать анархии на нашей земле"
  old.6.t: "Вперёд в будущее"
  old.6.d: "Вот и настал момент, когда нас больше никто не сдерживает. Конечно, было бы лучше изменить власть в конфетном королевстве изнутри, убрать дьявольскую принцессу и посадить на трон настоящего народного короля, но получилось как получилось. Теперь мы сами по себе, и раз нам не дали исправить империю изнутри, мы построим свою собственную, с блекджеком и... Идеальную в общем."
  old.6.a: "Старчи поведёт нас и впредь"
  old.6.b: "Миротворец приведёт нас к величию"
  old.7.t: "[FROM.GetLeader] хочет переговорить с Мятным"
  old.7.d: "У [FROM.GetLeader] есть какие-то свои планы по улучшению жизни в королевстве или что-то в этом роде. Он многое просит за это... Но кто знает? Может оно стоит того."
  old.7.a: "Пускай"
  old.7.b: "Для чего это? Нет!"
  old.8.t: "Судьбаносная сделка"
  old.8.d: "Власти империи дали добро на нашу встречу с приближённым принцессы - мятным лакеем. Договорённость с ним, это наш ключ к высшим эшелонам власти."
  old.8.a: "Столько власти нам и не снилось"
  old.8.b: "Надо больше!"
  old.9.t: "Свет во тьме"
  old.9.d: "Здесь собрались те, кому не плевать на судьбу их родины. По крайней мере мы на это надеемся."
  old.9.a: "Мы мирная организация"
  old.9.b: "Мы милитаризированная организация"
  old.10.t: "Вербовка Миротворца"
  old.10.d: "С такими людьми как он, свержение власти принцессы не за горами!"
  old.10.a: "Мир уже близко"
  old.11.t: "Прослушка обнаружена"
  old.11.d: "Принцесса знает, что мы готовим заговор. Нужно действовать быстрее."
  old.11.a: "Вот те на"
  old.12.t: "Дискредитирующее заявление"
  old.12.d: ""
  old.12.a: "Принцесса - ящер!"
  old.12.b: "Власть принцессы - это миф!"
  old.12.c: "Власть конфетного королевства преступна!"
  old.13.t: "Новый вектор пропаганды"
  old.13.d: ""
  old.13.a: "Мы сосредоточимся на своих людях"
  old.13.b: "Мы сосредоточимся на мировом признании."
  old.14.t: "[FROM.GetLeader] требует большего"
  old.14.d: ""
  old.14.a: "Что ж, пускай"
  old.14.b: "Ага, а что ещё ему дать?"
  old.15.t: "Мятный лакей трагически погибает"
  old.15.d: ""
  old.15.a: "Казнить подозреваемых в заговоре"
  old.15.b: "Сейчас не время искать виноватых"
  old.16.t: "Призрачный вопрос"
  old.16.d: "На пути к землям вампиров тьма призраков. Они могут быть заодно с нашими злейшими врагами. Нежить всё таки. Но есть шанс договориться."
  old.16.a: "Они либо с нами, либо против нас"
  old.16.b: "Они и так доказали свою лояльность"
  old.17.t: "Бежать некуда"
  old.17.d: "Это сотрудничество не могло продолжаться вечно. Нас прижали к стенке."
  old.17.a: "Мы смиренно принимаем судьбу"
  old.17.b: "Пусть наши отношения хотя бы будут равными"
  old.18.t: "Ситуация выходит из под контроля"
  old.18.d: "Опасный террорист узнал, что мы шпионим за ним и уже готовит свой ответ. Мы должны опередить его, однако слишком решительные действия могут только спровоцировать общество, не готовое к репрессиям и не представляющее всю угрозу, что нависла над ним. Нас могут не так понять."
  old.18.a: "Подготовить группу перехвата немедленно"
  old.18.b: "Разберёмся по ходу дела. Мятный, заваривай ромашковый чай!"
  old.19.t: "Миротворец схвачен"
  old.19.d: "Бананагвардия среагировала на угрозу моментально и в течении недели, после того как вскрылась слежка принцессы, взяла штурмом дом Миротворца. Он не стал сопротивляться подавляющему большинству полицейских, значительно упростив для власти задачу."
  old.19.a: "Конец его деяниям"
  old.20.t: "Неудачное покушение на Миротворца"
  old.20.d: "Это же Мятный! И он бросает Миротворцу вызов."
  old.20.a: "Всё решится на арене магов"
  old.20.b: "Никаких поблажек"
  old.21.t: "Итог сражения"
  old.21.d: "Миротворец проиграл. Мятный использовал его детей, чтобы через жантаж уговорить прекратить свою деятельность."
  old.21.a: "Какая низость"
  old.22.t: "Угроза миновала"
  old.22.d: "Миротворец, по удачному стечению обстоятельств, спятил и отказался от своих планов по свержению принцессы. Да здравствует [ROOT.GetName]!"
  old.22.a: "В этот раз пронесло"
  old.23.t: "Мятного убили на тайном задании"
  old.23.d: "К нашему удивлению, Мятный лакей попытался сам разобраться с проблемой Миротворца и пал от руки последнего. Неудачная засада закончилась поножовщиной с летальным исходом. А сепаратисты теперь имеют больше стимулов бороться против режима."
  old.23.a: "Худший исход"
  old.24.t: "Итог нашей борьбы"
  old.24.d: "Мы многое сделали и многое рассказали, так чем же закончится наша борьба?"
  old.24.a: "Мы можем настроить против принцессы соседей"
  old.24.b: "Мы проникнем во все сферы гос-регулирования"
  old.24.c: "Не будем спешить и накопим ресурсы"
  old.25.t: "Враги повсюду"
  old.25.d: "Империи как никогда нужна стабильность, кругом предатели и крысы."
  old.25.a: "Изловить гадов!"
  old.25.b: "Хе-хе"