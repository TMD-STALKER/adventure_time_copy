l_russian:
 
 ###OLD
 OLD_focus_tree: "Древо фокусов Старчи"
 OLD_death_or_freedom: "Смерть или свобода"
 OLD_death_or_freedom_desc: "Конфетный народ либо станет свободным, либо прекратит существовать, ибо нет смысла жить под властью вечноживущего диктатора. "
 help_bb: "Помощь принцессе"
 OLD_helping_pb_tt: "\nЭксперимент с формулой жизни пройдёт удачно и восстания зомби можно будет избежать."
 OLD_stay_away: "Оставаться в стороне"
 OLD_stay_away_desc: "Принцесса занимается своими премудрыми делами. Не будем мешать ей, но и помогать тоже не стоит. "
 OLD_helping_pb: "Помочь принцессе"
 OLD_helping_pb_desc: "Что-то мутно всё это. Ненадёжно. Опять принцесса самоуверенно собирается выкинуть что-то такое эдакое, что выйдет нам всем богом. Лучше подстраховать её."
 OLD_try_to_stop: "Остановить эксперимент"
 OLD_try_to_stop_desc: "То, что принцесса собирается сотворить на кладбище - просто отвратительно. Над долг любой ценой помешать её опасным экспериментам, пусть даже если нас заходят убить за это."
 OLD_education_with_princess: "Обучение с принцессой"
 OLD_education_with_princess_desc: "Старчи и его сподвижникам предстоит многому научится, прежде чем они смогут стать верными слугами принцессы. Чтож, потратим время."
 OLD_investing_in_researches: "Вложиться в исследования"
 OLD_investing_in_researches_desc: "Наука - это будущее. Нельзя оставлять наше будущее на самотёк, мы возьмём всё в свои руки и распределим средства грамотно."
 OLD_anti_vampire_propaganda: "Наш новый враг"
 OLD_anti_vampire_propaganda_desc: "Принцесса нам не враг, теперь это очевидно. Но кто тогда? Кто строит козни империи сластей и стоит за всем злом в мире? Вампиры! Если быть точным, один конкретный вампир по имени [MAR.GetLeader]. Но на пути к этому чудовищу лежит кладбище духов. Мы должны убедится в том, что они нам не помешают."
 OLD_radio_of_science: "Радио науки"
 OLD_radio_of_science_desc: "Мы будем вещать о науке на все земли УУУ, или по крайней мере на всю империю. В любом случае слухи о величии познаний нашей принцессы дойдут до каждого!"
 OLD_form_civil_guard: "Сформировать гражданскую гвардию"
 OLD_form_civil_guard_desc: "Мы должны помочь принцессе собрать гвардию верных подданных, готовых с оружием в руках защищать свою родину. "
 OLD_united_with_nuts_kingdom: "Новая конфетная нация"
 OLD_united_with_nuts_kingdom_desc: "Север империи пребывает в упадке и разладе, это никуда не годится. Если [NUT.GetName] не хочет брать ситуацию под контроль, это сделаем мы. Пора разрушить бюрократические барьеры и объединиться в единый северный доминион на службе принцессы. Это будет отличное начало восстановления северных владений."
 OLD_create_organization_of_resistance: "Собрать организацию сопротивления"
 OLD_create_organization_of_resistance_desc: "Пора воззвать ко всем неравнодушным! Вставай жевачкой опьянённый весь мир голодных и рабов!"
 OLD_recrute_professionals: "Завербовать профессионалов"
 OLD_recrute_professionals_desc: "Если мы действительно хотим что-то поменять, нам нужны люди соответствующих качеств и талантов."
 OLD_radiostation_of_truth: "Радиостанция правды"
 OLD_radiostation_of_truth_desc: "Благодаря поддержке неравнодушных сторонников правды [FROM.GetLeader] получил возможность открыть свою радиостанцию, откуда он будет вещать о проблемах насущных."
 OLD_speach_for_our_people: "Работа на аудиторию королевства"
 OLD_speach_for_our_people_desc: "Каждый в королевстве должен знать, за кем правда и кого надо опасаться. А кто, если не мы?"
 OLD_speach_for_foregn_governments: "Работа на иностранную аудиторию"
 OLD_speach_for_foregn_governments_desc: ""
 OLD_descriditation_of_princess: "Дескредитация принцессы"
 OLD_descriditation_of_princess_desc: "Мы рассказали и показали достаточно, чтобы убедить народ в том, что принцессе верить нельзя. Теперь, пришло время втоптать её имя в грязь раз и навсегда, выпустив наше последнее разоблачение..."
 OLD_use_shavels: "Используйте лопаты!"
 OLD_use_shavels_desc: "Прежде чем приспешники узурпатора трона доберутся до нас, они столкнутся с киллометрами минных полей и ловушек, которые мы так старательно подготовили."
 OLD_create_of_new_country: "Государство нового образца"
 OLD_create_of_new_country_desc: "Времена меняются. Мы более не часть империи сластей, не часть угнетаемого народа, теперь мы нечто новое. Новый имидж поможет это утвердить."
 OLD_found_secrets: "Копать глубже"
 OLD_found_secrets_desc: ""
 OLD_ready_for_liberation: "Готовы к освобождению"
 OLD_ready_for_liberation_desc: ""
 OLD_deal_with_batler: "Сделка с лакеем"
 OLD_deal_with_batler_desc: "Договорившись с даверенным лицом принцессы, мы сможем убедить её в необходимости крестового похода против вампира на севере"
 OLD_war_with_batler: "Подставить лакея"
 OLD_war_with_batler_desc: ""
