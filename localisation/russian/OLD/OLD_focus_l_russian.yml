 killed_flag: "Убит"
 batler_go: "Мятный лакей тайно возьмёт всё в свои руки"
 OLD_found_secrets_ttt: "\nЕсли предварительно выполнить фокус §HДискредитация принцессы§!, то здесь появится дополнительный эффект."
 OLD_ready_for_liberation_tt: "\nКогда метрополия окажется в состоянии войны и на 51% приблизится к капитуляции, нам будет предложено провозгласить независимость и выйти из войны на условиях статуса КВО."
 all_neighbors_not_friends: "\nВсе соседние страны, не являющиеся союзником нашей метрополии, получат против неё цель войны."